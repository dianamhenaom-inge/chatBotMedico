<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1300" height="1080" viewBox="0 0 1300 1080" font-family="Segoe UI, Arial, sans-serif">

  <defs>
    <marker id="arr" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#1a3a5c"/>
    </marker>
    <marker id="arr-g" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#0e6655"/>
    </marker>
    <marker id="arr-r" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#c0392b"/>
    </marker>
    <marker id="arr-o" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#e67e22"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1300" height="1080" fill="#f0f4f8" rx="10"/>

  <!-- Title -->
  <rect x="0" y="0" width="1300" height="48" fill="#1a3a5c" rx="10"/>
  <rect x="0" y="40" width="1300" height="8" fill="#1a3a5c"/>
  <text x="650" y="30" text-anchor="middle" fill="white" font-size="17" font-weight="bold">DIAGRAMA DE FLUJO CONVERSACIONAL — ChatBot Médico</text>

  <!-- ══════════════════════════════════════
       START
  ══════════════════════════════════════ -->
  <circle cx="650" cy="90" r="20" fill="#1a3a5c"/>
  <text x="650" y="120" text-anchor="middle" fill="#1a3a5c" font-size="10" font-weight="bold">INICIO</text>
  <line x1="650" y1="110" x2="650" y2="133" stroke="#1a3a5c" stroke-width="2" marker-end="url(#arr)"/>

  <!-- WELCOME box -->
  <rect x="510" y="135" width="280" height="45" rx="8" fill="#1a3a5c"/>
  <text x="650" y="154" text-anchor="middle" fill="white" font-size="10" font-weight="bold">👋 Bienvenida</text>
  <text x="650" y="170" text-anchor="middle" fill="#aed6f1" font-size="9">"¿Quién eres? 1) Paciente  2) Médico"</text>
  <line x1="650" y1="180" x2="650" y2="203" stroke="#1a3a5c" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Gateway: tipo usuario -->
  <polygon points="650,205 680,225 650,245 620,225" fill="white" stroke="#1a3a5c" stroke-width="2.5"/>
  <text x="650" y="229" text-anchor="middle" fill="#1a3a5c" font-size="9" font-weight="bold">Tipo</text>
  <text x="610" y="260" text-anchor="middle" fill="#0e6655" font-size="9" font-weight="bold">1 = Paciente</text>
  <text x="690" y="260" text-anchor="middle" fill="#c0392b" font-size="9" font-weight="bold">2 = Médico</text>

  <!-- ══════════════════════════════════════
       RAMA PACIENTE (izquierda)
  ══════════════════════════════════════ -->
  <line x1="620" y1="225" x2="350" y2="225" stroke="#0e6655" stroke-width="2"/>
  <line x1="350" y1="225" x2="350" y2="273" stroke="#0e6655" stroke-width="2" marker-end="url(#arr-g)"/>

  <!-- Box: Ingresar nombre paciente -->
  <rect x="220" y="275" width="260" height="42" rx="8" fill="#e8f6f3" stroke="#0e6655" stroke-width="2"/>
  <text x="350" y="292" text-anchor="middle" fill="#0e6655" font-size="10" font-weight="bold">Ingresa nombre</text>
  <text x="350" y="308" text-anchor="middle" fill="#555" font-size="8">[getOrCreatePatient]</text>
  <line x1="350" y1="317" x2="350" y2="340" stroke="#0e6655" stroke-width="2" marker-end="url(#arr-g)"/>

  <!-- MENÚ PACIENTE box -->
  <rect x="195" y="342" width="310" height="45" rx="8" fill="#0e6655"/>
  <text x="350" y="361" text-anchor="middle" fill="white" font-size="10" font-weight="bold">MENÚ PACIENTE</text>
  <text x="350" y="377" text-anchor="middle" fill="#a9dfbf" font-size="8">1) Registrar  2) Ver  3) Eliminar  4) Cerrar sesión</text>

  <!-- Gateway menú paciente -->
  <line x1="350" y1="387" x2="350" y2="407" stroke="#0e6655" stroke-width="2" marker-end="url(#arr-g)"/>
  <polygon points="350,409 375,427 350,445 325,427" fill="white" stroke="#0e6655" stroke-width="2.5"/>
  <text x="350" y="430" text-anchor="middle" fill="#0e6655" font-size="8">opción</text>

  <!-- Opción 1: Registrar signos -->
  <line x1="325" y1="427" x2="110" y2="427" stroke="#0e6655" stroke-width="1.8"/>
  <line x1="110" y1="427" x2="110" y2="488" stroke="#0e6655" stroke-width="1.8" marker-end="url(#arr-g)"/>
  <text x="210" y="420" text-anchor="middle" fill="#0e6655" font-size="8">1</text>

  <!-- Opción 2: Ver -->
  <line x1="350" y1="445" x2="350" y2="488" stroke="#0e6655" stroke-width="1.8" marker-end="url(#arr-g)"/>
  <text x="360" y="468" fill="#0e6655" font-size="8">2</text>

  <!-- Opción 3: Eliminar -->
  <line x1="375" y1="427" x2="540" y2="427" stroke="#0e6655" stroke-width="1.8"/>
  <line x1="540" y1="427" x2="540" y2="488" stroke="#0e6655" stroke-width="1.8" marker-end="url(#arr-g)"/>
  <text x="458" y="420" text-anchor="middle" fill="#0e6655" font-size="8">3</text>

  <!-- Opción 4: Logout -->
  <text x="350" y="530" text-anchor="middle" fill="#c0392b" font-size="8">4 → INICIO</text>

  <!-- BLOQUE REGISTRO DE SIGNOS VITALES -->
  <rect x="20" y="490" width="180" height="295" rx="8" fill="#d5f5e3" stroke="#0e6655" stroke-width="2"/>
  <text x="110" y="508" text-anchor="middle" fill="#0e6655" font-size="9" font-weight="bold">REGISTRO SIGNOS</text>

  <rect x="30" y="515" width="160" height="28" rx="5" fill="white" stroke="#0e6655" stroke-width="1.5"/>
  <text x="110" y="526" text-anchor="middle" fill="#0e6655" font-size="8" font-weight="bold">Sistólica</text>
  <text x="110" y="537" text-anchor="middle" fill="#555" font-size="7">70–250 mmHg</text>

  <line x1="110" y1="543" x2="110" y2="553" stroke="#0e6655" stroke-width="1.5" marker-end="url(#arr-g)"/>
  <rect x="30" y="555" width="160" height="28" rx="5" fill="white" stroke="#0e6655" stroke-width="1.5"/>
  <text x="110" y="566" text-anchor="middle" fill="#0e6655" font-size="8" font-weight="bold">Diastólica</text>
  <text x="110" y="577" text-anchor="middle" fill="#555" font-size="7">40–150 mmHg · &lt; sistólica</text>

  <line x1="110" y1="583" x2="110" y2="593" stroke="#0e6655" stroke-width="1.5" marker-end="url(#arr-g)"/>
  <rect x="30" y="595" width="160" height="28" rx="5" fill="white" stroke="#0e6655" stroke-width="1.5"/>
  <text x="110" y="606" text-anchor="middle" fill="#0e6655" font-size="8" font-weight="bold">Frec. Cardíaca</text>
  <text x="110" y="617" text-anchor="middle" fill="#555" font-size="7">30–220 lpm</text>

  <line x1="110" y1="623" x2="110" y2="633" stroke="#0e6655" stroke-width="1.5" marker-end="url(#arr-g)"/>
  <!-- Temperatura opcional -->
  <polygon points="110,635 125,650 110,665 95,650" fill="white" stroke="#e67e22" stroke-width="1.5"/>
  <text x="110" y="654" text-anchor="middle" fill="#e67e22" font-size="7">¿Temp?</text>
  <rect x="30" y="675" width="160" height="25" rx="5" fill="white" stroke="#e67e22" stroke-width="1.5" stroke-dasharray="4,2"/>
  <text x="110" y="692" text-anchor="middle" fill="#e67e22" font-size="8">Temp (34–42 °C)</text>
  <line x1="110" y1="700" x2="110" y2="710" stroke="#e67e22" stroke-width="1.5" marker-end="url(#arr-o)"/>
  <!-- O2 opcional -->
  <polygon points="110,712 125,727 110,742 95,727" fill="white" stroke="#e67e22" stroke-width="1.5"/>
  <text x="110" y="731" text-anchor="middle" fill="#e67e22" font-size="7">¿O₂?</text>
  <rect x="30" y="752" width="160" height="25" rx="5" fill="white" stroke="#e67e22" stroke-width="1.5" stroke-dasharray="4,2"/>
  <text x="110" y="769" text-anchor="middle" fill="#e67e22" font-size="8">Saturación O₂ (50–100 %)</text>

  <!-- Save OK -->
  <line x1="110" y1="777" x2="110" y2="787" stroke="#0e6655" stroke-width="1.5" marker-end="url(#arr-g)"/>
  <rect x="40" y="789" width="140" height="22" rx="5" fill="#0e6655"/>
  <text x="110" y="804" text-anchor="middle" fill="white" font-size="8" font-weight="bold">✅ Guardado</text>
  <!-- Volver al menú -->
  <line x1="200" y1="800" x2="350" y2="800" stroke="#0e6655" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="350" y1="800" x2="350" y2="387" stroke="#0e6655" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arr-g)"/>

  <!-- VER REGISTROS box -->
  <rect x="220" y="490" width="260" height="55" rx="8" fill="#d5f5e3" stroke="#0e6655" stroke-width="2"/>
  <text x="350" y="508" text-anchor="middle" fill="#0e6655" font-size="9" font-weight="bold">VER REGISTROS</text>
  <text x="350" y="522" text-anchor="middle" fill="#555" font-size="8">Lista registros con alertas clínicas</text>
  <text x="350" y="535" text-anchor="middle" fill="#555" font-size="8">y observaciones del médico</text>
  <line x1="350" y1="545" x2="350" y2="565" stroke="#0e6655" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arr-g)"/>
  <text x="350" y="578" text-anchor="middle" fill="#0e6655" font-size="8">← Regresa al menú</text>

  <!-- ELIMINAR REGISTRO box -->
  <rect x="430" y="490" width="220" height="85" rx="8" fill="#d5f5e3" stroke="#0e6655" stroke-width="2"/>
  <text x="540" y="508" text-anchor="middle" fill="#0e6655" font-size="9" font-weight="bold">ELIMINAR REGISTRO</text>
  <text x="540" y="522" text-anchor="middle" fill="#555" font-size="8">Muestra lista numerada</text>
  <polygon points="540,535 555,548 540,561 525,548" fill="white" stroke="#0e6655" stroke-width="1.5"/>
  <text x="540" y="552" text-anchor="middle" fill="#0e6655" font-size="7">N°?</text>
  <text x="540" y="572" text-anchor="middle" fill="#555" font-size="8">Confirma y elimina / cancelar</text>

  <!-- ══════════════════════════════════════
       RAMA MÉDICO (derecha)
  ══════════════════════════════════════ -->
  <line x1="680" y1="225" x2="950" y2="225" stroke="#c0392b" stroke-width="2"/>
  <line x1="950" y1="225" x2="950" y2="273" stroke="#c0392b" stroke-width="2" marker-end="url(#arr-r)"/>

  <!-- Box: Ingresar nombre médico -->
  <rect x="820" y="275" width="260" height="42" rx="8" fill="#fdf2f0" stroke="#c0392b" stroke-width="2"/>
  <text x="950" y="292" text-anchor="middle" fill="#c0392b" font-size="10" font-weight="bold">Ingresa nombre</text>
  <text x="950" y="308" text-anchor="middle" fill="#555" font-size="8">[findDoctor → nombre + contraseña]</text>
  <line x1="950" y1="317" x2="950" y2="340" stroke="#c0392b" stroke-width="2" marker-end="url(#arr-r)"/>

  <!-- Box: Contraseña -->
  <rect x="820" y="342" width="260" height="40" rx="8" fill="#fdf2f0" stroke="#c0392b" stroke-width="2"/>
  <text x="950" y="359" text-anchor="middle" fill="#c0392b" font-size="10" font-weight="bold">Ingresa contraseña</text>
  <text x="950" y="375" text-anchor="middle" fill="#555" font-size="8">Validación contra SEED_DOCTORS</text>
  <line x1="950" y1="382" x2="950" y2="402" stroke="#c0392b" stroke-width="2" marker-end="url(#arr-r)"/>

  <!-- Gateway: Auth OK? -->
  <polygon points="950,404 975,422 950,440 925,422" fill="white" stroke="#c0392b" stroke-width="2.5"/>
  <text x="950" y="426" text-anchor="middle" fill="#c0392b" font-size="8">Auth?</text>
  <!-- Auth falla -->
  <line x1="975" y1="422" x2="1100" y2="422" stroke="#c0392b" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="1040" y="415" fill="#c0392b" font-size="8">No → reintentar</text>
  <line x1="1100" y1="422" x2="1100" y2="330" stroke="#c0392b" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="1100" y1="330" x2="1080" y2="330" stroke="#c0392b" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arr-r)"/>
  <!-- Auth OK -->
  <line x1="950" y1="440" x2="950" y2="463" stroke="#c0392b" stroke-width="2" marker-end="url(#arr-r)"/>
  <text x="960" y="455" fill="#0e6655" font-size="8">Sí</text>

  <!-- MENÚ MÉDICO box -->
  <rect x="795" y="465" width="310" height="45" rx="8" fill="#c0392b"/>
  <text x="950" y="484" text-anchor="middle" fill="white" font-size="10" font-weight="bold">MENÚ MÉDICO</text>
  <text x="950" y="500" text-anchor="middle" fill="#fadbd8" font-size="8">1) Pacientes  2) Registros  3) Observación  4) Salir</text>

  <!-- Gateway menú médico -->
  <line x1="950" y1="510" x2="950" y2="530" stroke="#c0392b" stroke-width="2" marker-end="url(#arr-r)"/>
  <polygon points="950,532 975,550 950,568 925,550" fill="white" stroke="#c0392b" stroke-width="2.5"/>
  <text x="950" y="554" text-anchor="middle" fill="#c0392b" font-size="8">opción</text>

  <!-- Opción 1: Listar pacientes -->
  <line x1="925" y1="550" x2="760" y2="550" stroke="#c0392b" stroke-width="1.8"/>
  <line x1="760" y1="550" x2="760" y2="590" stroke="#c0392b" stroke-width="1.8" marker-end="url(#arr-r)"/>
  <text x="840" y="543" text-anchor="middle" fill="#c0392b" font-size="8">1</text>
  <rect x="685" y="592" width="150" height="35" rx="6" fill="#fdf2f0" stroke="#c0392b" stroke-width="1.5"/>
  <text x="760" y="607" text-anchor="middle" fill="#c0392b" font-size="8" font-weight="bold">Lista Pacientes</text>
  <text x="760" y="620" text-anchor="middle" fill="#555" font-size="7">Numerada en pantalla</text>

  <!-- Opción 2: Ver registros de paciente -->
  <line x1="950" y1="568" x2="950" y2="592" stroke="#c0392b" stroke-width="1.8" marker-end="url(#arr-r)"/>
  <text x="960" y="582" fill="#c0392b" font-size="8">2</text>
  <rect x="875" y="594" width="150" height="35" rx="6" fill="#fdf2f0" stroke="#c0392b" stroke-width="1.5"/>
  <text x="950" y="609" text-anchor="middle" fill="#c0392b" font-size="8" font-weight="bold">Seleccionar paciente</text>
  <text x="950" y="622" text-anchor="middle" fill="#555" font-size="7">Ver registros completos</text>

  <!-- Opción 3: Agregar observación -->
  <line x1="975" y1="550" x2="1140" y2="550" stroke="#c0392b" stroke-width="1.8"/>
  <line x1="1140" y1="550" x2="1140" y2="592" stroke="#c0392b" stroke-width="1.8" marker-end="url(#arr-r)"/>
  <text x="1058" y="543" text-anchor="middle" fill="#c0392b" font-size="8">3</text>
  <rect x="1065" y="594" width="150" height="35" rx="6" fill="#fdf2f0" stroke="#c0392b" stroke-width="1.5"/>
  <text x="1140" y="609" text-anchor="middle" fill="#c0392b" font-size="8" font-weight="bold">Seleccionar paciente</text>
  <text x="1140" y="622" text-anchor="middle" fill="#555" font-size="7">→ registro → observación</text>

  <!-- Sub-flujo observación -->
  <line x1="1140" y1="629" x2="1140" y2="649" stroke="#c0392b" stroke-width="1.5" marker-end="url(#arr-r)"/>
  <rect x="1065" y="651" width="150" height="30" rx="6" fill="#fdf2f0" stroke="#c0392b" stroke-width="1.5"/>
  <text x="1140" y="663" text-anchor="middle" fill="#c0392b" font-size="8" font-weight="bold">Elegir N° registro</text>
  <text x="1140" y="675" text-anchor="middle" fill="#555" font-size="7">1 a N</text>
  <line x1="1140" y1="681" x2="1140" y2="701" stroke="#c0392b" stroke-width="1.5" marker-end="url(#arr-r)"/>
  <rect x="1065" y="703" width="150" height="30" rx="6" fill="#fdf2f0" stroke="#c0392b" stroke-width="1.5"/>
  <text x="1140" y="715" text-anchor="middle" fill="#c0392b" font-size="8" font-weight="bold">Escribir observación</text>
  <text x="1140" y="727" text-anchor="middle" fill="#555" font-size="7">Texto libre</text>
  <line x1="1140" y1="733" x2="1140" y2="753" stroke="#c0392b" stroke-width="1.5" marker-end="url(#arr-r)"/>
  <rect x="1075" y="755" width="130" height="25" rx="5" fill="#c0392b"/>
  <text x="1140" y="772" text-anchor="middle" fill="white" font-size="8" font-weight="bold">✅ Observación guardada</text>

  <!-- Volver al menú médico -->
  <line x1="950" y1="629" x2="950" y2="649" stroke="#c0392b" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="960" y="642" fill="#555" font-size="8">← regresa</text>
  <line x1="760" y1="627" x2="760" y2="649" stroke="#c0392b" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="760" y1="649" x2="950" y2="649" stroke="#c0392b" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="950" y1="649" x2="950" y2="512" stroke="#c0392b" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arr-r)"/>

  <!-- Opción 4 (logout) -->
  <text x="980" y="564" fill="#c0392b" font-size="8">4 → INICIO</text>

  <!-- ══════════════════════════════════════
       ALERTAS CLÍNICAS (nota flotante)
  ══════════════════════════════════════ -->
  <rect x="645" y="820" width="390" height="105" rx="8" fill="#fef9e7" stroke="#f0ad4e" stroke-width="2"/>
  <text x="840" y="838" text-anchor="middle" fill="#7d6608" font-size="10" font-weight="bold">⚠️ Alertas Clínicas Automáticas</text>
  <text x="840" y="855" text-anchor="middle" fill="#555" font-size="8">🚨 Sistólica ≥ 180 mmHg → Crisis hipertensiva</text>
  <text x="840" y="868" text-anchor="middle" fill="#555" font-size="8">⚠️ Sistólica 130–179 / Diastólica ≥ 90 → Hipertensión</text>
  <text x="840" y="881" text-anchor="middle" fill="#555" font-size="8">⚠️ F.Cardíaca &gt; 100 → Taquicardia  |  &lt; 60 → Bradicardia</text>
  <text x="840" y="894" text-anchor="middle" fill="#555" font-size="8">⚠️ Temperatura ≥ 38 °C → Fiebre  |  &lt; 36 °C → Hipotermia</text>
  <text x="840" y="907" text-anchor="middle" fill="#555" font-size="8">🚨 O₂ &lt; 90 % → Saturación crítica</text>

  <!-- ══════════════════════════════════════
       LEYENDA COLORES
  ══════════════════════════════════════ -->
  <rect x="25" y="840" width="600" height="60" rx="6" fill="white" stroke="#ccc" stroke-width="1"/>
  <text x="35" y="858" fill="#333" font-size="10" font-weight="bold">Leyenda de colores:</text>
  <rect x="35" y="866" width="14" height="10" rx="2" fill="#0e6655"/>
  <text x="54" y="876" fill="#0e6655" font-size="9">Flujo Paciente</text>
  <rect x="145" y="866" width="14" height="10" rx="2" fill="#c0392b"/>
  <text x="164" y="876" fill="#c0392b" font-size="9">Flujo Médico</text>
  <rect x="255" y="866" width="14" height="10" rx="2" fill="#e67e22"/>
  <text x="274" y="876" fill="#e67e22" font-size="9">Campos opcionales</text>
  <rect x="390" y="866" width="14" height="10" rx="2" fill="#1a3a5c"/>
  <text x="409" y="876" fill="#1a3a5c" font-size="9">Flujo común / inicio</text>
  <polygon points="35,893 43,882 51,893 43,904" fill="white" stroke="#1a3a5c" stroke-width="1.5"/>
  <text x="57" y="893" fill="#555" font-size="9">Gateway (decisión)</text>
  <line x1="140" y1="892" x2="165" y2="892" stroke="#1a3a5c" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arr)"/>
  <text x="170" y="896" fill="#555" font-size="9">Flujo de retorno</text>

  <!-- Estado: persistencia -->
  <rect x="1050" y="820" width="220" height="60" rx="6" fill="#eaf2ff" stroke="#1a3a5c" stroke-width="1.5"/>
  <text x="1160" y="838" text-anchor="middle" fill="#1a3a5c" font-size="10" font-weight="bold">💾 Persistencia</text>
  <text x="1160" y="853" text-anchor="middle" fill="#555" font-size="8">Todos los datos se guardan en</text>
  <text x="1160" y="866" text-anchor="middle" fill="#555" font-size="8">localStorage del navegador.</text>
  <text x="1160" y="879" text-anchor="middle" fill="#555" font-size="8">Sobreviven recargas de página.</text>

</svg>
